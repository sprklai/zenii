name: Release

on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch:
    inputs:
      platforms:
        description: "Platforms to build (comma-separated: linux,windows,macos)"
        required: false
        default: "linux,windows,macos"
      version:
        description: "Version override (e.g., 1.2.0)"
        required: false
      publish:
        description: "Publish GitHub release"
        required: false
        type: boolean
        default: true

env:
  CARGO_INCREMENTAL: 0

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    if: >-
      github.event_name == 'push' ||
      contains(github.event.inputs.platforms, 'linux')
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            clang \
            lld \
            rpm

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: web
        run: bun install

      - name: Build desktop (deb, appimage, rpm)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/mesoclaw-desktop
          args: --bundles deb,appimage,rpm -- --profile ci-release

      - name: Build standalone CLI and daemon
        run: cargo build --profile ci-release -p mesoclaw-cli -p mesoclaw-daemon --all-features

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-desktop
          path: |
            target/ci-release/bundle/deb/*.deb
            target/ci-release/bundle/appimage/*.AppImage
            target/ci-release/bundle/rpm/*.rpm

      - name: Upload standalone binaries
        uses: actions/upload-artifact@v7
        with:
          name: linux-standalone
          path: |
            target/ci-release/mesoclaw-cli
            target/ci-release/mesoclaw-daemon

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    if: >-
      github.event_name == 'push' ||
      contains(github.event.inputs.platforms, 'windows')
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: web
        run: bun install

      - name: Build desktop (msi, nsis)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/mesoclaw-desktop
          args: --bundles msi,nsis -- --profile ci-release

      - name: Build standalone CLI and daemon
        run: cargo build --profile ci-release -p mesoclaw-cli -p mesoclaw-daemon --all-features

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-desktop
          path: |
            target/ci-release/bundle/msi/*.msi
            target/ci-release/bundle/nsis/*.exe

      - name: Upload standalone binaries
        uses: actions/upload-artifact@v7
        with:
          name: windows-standalone
          path: |
            target/ci-release/mesoclaw-cli.exe
            target/ci-release/mesoclaw-daemon.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    if: >-
      github.event_name == 'push' ||
      contains(github.event.inputs.platforms, 'macos')
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: web
        run: bun install

      - name: Import Apple certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build desktop (dmg) - aarch64
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: crates/mesoclaw-desktop
          args: --target aarch64-apple-darwin --bundles dmg -- --profile ci-release

      - name: Build desktop (dmg) - x86_64
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: crates/mesoclaw-desktop
          args: --target x86_64-apple-darwin --bundles dmg -- --profile ci-release

      - name: Build standalone CLI and daemon (universal)
        run: |
          cargo build --profile ci-release -p mesoclaw-cli -p mesoclaw-daemon --all-features --target aarch64-apple-darwin
          cargo build --profile ci-release -p mesoclaw-cli -p mesoclaw-daemon --all-features --target x86_64-apple-darwin
          mkdir -p target/ci-release/universal
          lipo -create \
            target/aarch64-apple-darwin/ci-release/mesoclaw-cli \
            target/x86_64-apple-darwin/ci-release/mesoclaw-cli \
            -output target/ci-release/universal/mesoclaw-cli
          lipo -create \
            target/aarch64-apple-darwin/ci-release/mesoclaw-daemon \
            target/x86_64-apple-darwin/ci-release/mesoclaw-daemon \
            -output target/ci-release/universal/mesoclaw-daemon

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-desktop
          path: |
            target/aarch64-apple-darwin/ci-release/bundle/dmg/*.dmg
            target/x86_64-apple-darwin/ci-release/bundle/dmg/*.dmg

      - name: Upload standalone binaries
        uses: actions/upload-artifact@v7
        with:
          name: macos-standalone
          path: |
            target/ci-release/universal/mesoclaw-cli
            target/ci-release/universal/mesoclaw-daemon

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain $KEYCHAIN_PATH
          fi

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    if: >-
      startsWith(github.ref, 'refs/tags/app-v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.rpm" \
            -o -name "*.msi" -o -name "*.exe" -o -name "*.dmg" \
            -o -name "mesoclaw-cli" -o -name "mesoclaw-daemon" \
            -o -name "mesoclaw-cli.exe" -o -name "mesoclaw-daemon.exe" \) \
            -exec sha256sum {} \; > ../SHA256SUMS.txt
          cat ../SHA256SUMS.txt

      - name: Extract version from tag
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/app-v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MesoClaw v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.rpm
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/mesoclaw-cli
            artifacts/**/mesoclaw-daemon
            SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
