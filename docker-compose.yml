services:
  zenii:
    build: .
    ports:
      - "18981:18981"
    volumes:
      - ./config:/config:ro
      - zenii-data:/data
    environment:
      - ZENII_TOKEN=${ZENII_TOKEN:-}
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18981/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  zenii-data:
