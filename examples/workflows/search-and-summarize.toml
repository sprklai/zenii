id = "search-and-summarize"
name = "Search and Summarize"
description = "Searches the web, gathers system context, then reports completion"

[[steps]]
name = "web-search"
type = "tool"
tool = "web_search"
[steps.args]
query = "latest Rust language updates 2026"

[[steps]]
name = "gather-context"
type = "tool"
tool = "system_info"
[steps.args]
action = "all"

[[steps]]
name = "pause"
type = "delay"
seconds = 2
depends_on = ["web-search", "gather-context"]

[[steps]]
name = "report"
type = "tool"
tool = "shell"
depends_on = ["pause"]
[steps.args]
command = "echo 'Workflow complete: search and system data gathered'"
