id = "system-health-check"
name = "System Health Check"
description = "Gathers OS info, checks processes, lists current directory, and sends results to Telegram"

[[steps]]
name = "os_info"
type = "tool"
tool = "system_info"
[steps.args]
action = "os"

[[steps]]
name = "process_check"
type = "tool"
tool = "process"
depends_on = ["os_info"]
[steps.args]
action = "list"

[[steps]]
name = "disk_listing"
type = "tool"
tool = "file_list"
depends_on = ["os_info"]
[steps.args]
path = "."

[[steps]]
name = "notify_telegram"
type = "tool"
tool = "channel_send"
depends_on = ["process_check", "disk_listing"]
failure_policy = "continue"
[steps.args]
action = "send"
channel = "telegram"
message = 'System Health Check -- OS Info: {{steps.os_info.output}} -- Processes: {{steps.process_check.output}} -- Directory: {{steps.disk_listing.output}}'
